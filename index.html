<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Ali Mini Portal</title>
<style>
body{
font-family: Arial;
text-align:center;
background:#f2f2f2;
margin:0;
}

header{
background:#222;
color:white;
padding:20px;
}

.logo{
width:150px;
}

.menu{
margin-top:40px;
}

button{
display:block;
margin:15px auto;
padding:15px 25px;
font-size:18px;
border:none;
border-radius:12px;
background:#0077ff;
color:white;
cursor:pointer;
}

button:hover{
background:#0055cc;
}

#sonuc{
margin-top:30px;
font-size:20px;
}
</style>
</head>

<body>

<header>
<h1>ALI MINI PORTAL</h1>
<img src="logo.png" class="logo">
</header>

<div class="menu">
<button onclick="soru()">Bana bir şey sor</button>
<button onclick="test()">Bir test hazırla</button>
<button onclick="degisiklik()">Bugün farklı bir şeyler yapalım mı?</button>
</div>

<div id="sonuc"></div>

<script>

function soru(){
document.getElementById("sonuc").innerHTML =
"Merhaba sana nasıl yardımcı olabilirim bugün?";
}

function test(){
document.getElementById("sonuc").innerHTML =
"Bugün ne testi hazırlayalım?<br><br>- Matematik<br>- Türkçe<br>- Hayat Bilgisi<br>- İngilizce<br>- Almanca";
}

function degisiklik(){
document.getElementById("sonuc").innerHTML =
"Bugün ne gibi değişiklikler yapalım?";
}

</script>

</body>
</html>
