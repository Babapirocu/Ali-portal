<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Ali Portal</title>

<style>
body{
font-family:Arial;
background:#f2f2f2;
text-align:center;
margin:0;
}

.container{
margin-top:100px;
}

input{
padding:10px;
margin:10px;
font-size:16px;
}

button{
padding:10px 20px;
font-size:16px;
background:#0077ff;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

#portal{
display:none;
margin-top:50px;
}

#ai{
display:none;
margin-top:20px;
}

#cevap{
margin-top:20px;
font-weight:bold;
}
</style>

</head>

<body>

<div id="login" class="container">

<h2>Giriş Yap</h2>

<input id="email" placeholder="E-posta"><br>
<input id="sifre" type="password" placeholder="Şifre"><br>

<button onclick="giris()">Giriş Yap</button>

<p id="hata"></p>

</div>

<div id="portal">

<h2>Ali Portal</h2>

<button onclick="aiAc()">Yapay Zeka</button>

</div>

<div id="ai">

<h3>Yapay Zeka</h3>

<input id="soru" placeholder="Bir şey yaz...">

<button onclick="cevapla()">Gönder</button>

<p id="cevap"></p>

</div>

<script>

function giris(){

let email=document.getElementById("email").value;
let sifre=document.getElementById("sifre").value;

if(email==="İphone444" && sifre==="İphone555"){

document.getElementById("login").style.display="none";
document.getElementById("portal").style.display="block";

}else{

document.getElementById("hata").innerText="Giriş bilgileri yanlış";

}

}

function aiAc(){

document.getElementById("ai").style.display="block";

}

function cevapla(){

let soru=document.getElementById("soru").value;

let cevap="Bunu düşündüm ama cevap henüz eklenmedi 🙂";

document.getElementById("cevap").innerText=cevap;

}
<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Şifre Üretici</title>

<style>
body{
font-family: Arial;
background:#f2f2f2;
text-align:center;
padding:40px;
}

.menu{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
display:inline-block;
}

button{
padding:12px 20px;
font-size:16px;
cursor:pointer;
border:none;
background:#007bff;
color:white;
border-radius:5px;
}

button:hover{
background:#0056b3;
}

#sifre{
margin-top:20px;
font-size:40px;
font-weight:bold;
color:#333;
}

</style>
</head>

<body>

<div class="menu">

<h2>Şifre Sistemi</h2>

<button onclick="sifreUret()">Kırılamaz 4 Haneli Şifre Al</button>

<div id="sifre">----</div>

</div>

<script>

let kullanilanSifreler = new Set();

function sifreUret(){

if(kullanilanSifreler.size >= 10000){
document.getElementById("sifre").innerText="Tüm şifreler kullanıldı";
return;
}

let sifre;

do{
sifre = Math.floor(Math.random()*10000).toString().padStart(4,"0");
}
while(kullanilanSifreler.has(sifre));

kullanilanSifreler.add(sifre);

document.getElementById("sifre").innerText = sifre;

}

</script>

</body>
</html>
</script>

</body>
</html>
